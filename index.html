<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISHVI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Inter',sans-serif;
    background:#0f0f0f;
    color:#f5f5f5;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    padding:20px;
    position:fixed;
    width:100%;
    background:rgba(15,15,15,0.8);
    backdrop-filter:blur(10px);
    z-index:1000;
}

nav h1{
    font-family:'Playfair Display';
    letter-spacing:3px;
    font-size:18px;
}

nav ul{
    display:flex;
    gap:20px;
    list-style:none;
    font-size:12px;
}

/* HERO */
.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1520975954732-35dd22299614') center/cover no-repeat;
    display:flex;
    align-items:flex-end;
    padding:30px;
}

.hero h2{
    font-family:'Playfair Display';
    font-size:38px;
}

/* SECTION */
section{
    padding:60px 20px;
}

.section-title{
    font-size:12px;
    letter-spacing:2px;
    margin-bottom:30px;
    color:#aaa;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.product{
    cursor:pointer;
}

.product-img{
    position:relative;
    height:220px;
    overflow:hidden;
}

.product-img img{
    width:100%;
    height:100%;
    object-fit:cover;
    position:absolute;
    transition:0.5s;
}

.product-img img.second{
    opacity:0;
}

.product:hover img.first{
    opacity:0;
}
.product:hover img.second{
    opacity:1;
}

.product h3{
    margin-top:10px;
    font-size:13px;
}

.product p{
    font-size:12px;
    color:#bbb;
}

/* MODAL */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#0f0f0f;
    display:none;
    z-index:2000;
    padding:20px;
}

.modal img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.modal h2{margin-top:20px;}
.modal p{margin:10px 0;}

.close{
    position:absolute;
    top:20px;
    right:20px;
    cursor:pointer;
}

/* CART */
.cart{
    position:fixed;
    right:-100%;
    top:0;
    width:80%;
    height:100%;
    background:#111;
    padding:20px;
    transition:0.3s;
    z-index:3000;
}

.cart.open{
    right:0;
}

button{
    padding:10px;
    width:100%;
    background:#fff;
    border:none;
    margin-top:10px;
}

/* DESKTOP */
@media(min-width:900px){
    section{padding:100px 80px;}
    .products{grid-template-columns:repeat(4,1fr);}
    .hero h2{font-size:70px;}
}

/* REMOVE CURSOR ON MOBILE */
@media(max-width:768px){
    body{cursor:auto;}
}
</style>
</head>

<body>

<nav>
<h1>ISHVI</h1>
<ul>
<li>SHOP</li>
<li onclick="toggleCart()">CART</li>
</ul>
</nav>

<div class="hero">
<h2>NEW SEASON</h2>
</div>

<section>
<div class="section-title">LATEST</div>
<div class="products" id="products"></div>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="close" onclick="closeModal()">X</div>
<img id="modal-img">
<h2 id="modal-title"></h2>
<p id="modal-price"></p>
<button onclick="addToCart()">Add to Cart</button>
</div>

<!-- CART -->
<div class="cart" id="cart">
<h3>Cart</h3>
<div id="cart-items"></div>
</div>

<script>
// PRODUCT DATA (EDIT HERE LIKE ADMIN PANEL)
const products = [
{
name:"Black Hoodie",
price:"₹2999",
img1:"https://images.unsplash.com/photo-1520975922284-9e0c6a0d6b79",
img2:"https://images.unsplash.com/photo-1556821840-3a63f95609a7"
},
{
name:"White Tee",
price:"₹1499",
img1:"https://images.unsplash.com/photo-1516826957135-700dedea698c",
img2:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
}
];

// RENDER PRODUCTS
const container = document.getElementById("products");

products.forEach(p=>{
let div = document.createElement("div");
div.className="product";

div.innerHTML=`
<div class="product-img">
<img class="first" src="${p.img1}" loading="lazy">
<img class="second" src="${p.img2}" loading="lazy">
</div>
<h3>${p.name}</h3>
<p>${p.price}</p>
`;

div.onclick=()=>openModal(p);
container.appendChild(div);
});

// MODAL
let currentProduct="";
function openModal(p){
document.getElementById("modal").style.display="block";
document.getElementById("modal-img").src=p.img1;
document.getElementById("modal-title").innerText=p.name;
document.getElementById("modal-price").innerText=p.price;
currentProduct=p.name+" - "+p.price;
}
function closeModal(){
document.getElementById("modal").style.display="none";
}

// CART
let cart=JSON.parse(localStorage.getItem("cart"))||[];

function addToCart(){
cart.push(currentProduct);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}

function renderCart(){
const c=document.getElementById("cart-items");
c.innerHTML="";
cart.forEach(i=>{
let d=document.createElement("div");
d.innerText=i;
c.appendChild(d);
});
}
renderCart();

function toggleCart(){
document.getElementById("cart").classList.toggle("open");
}

// SMOOTH SCROLL (LIGHTWEIGHT)
document.documentElement.style.scrollBehavior = "smooth";
</script>

</body>
</html>
