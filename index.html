<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ISHVI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Inter';
    background:#0f0f0f;
    color:#fff;
}

nav{
    display:flex;
    justify-content:space-between;
    padding:20px;
    position:fixed;
    width:100%;
    background:rgba(0,0,0,0.8);
}

nav h1{
    font-family:'Playfair Display';
    letter-spacing:3px;
}

.hero{
    height:100vh;
    background:url('https://images.unsplash.com/photo-1515378791036-0648a3ef77b2') center/cover;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:30px;
}

.hero h2{
    font-size:40px;
    font-family:'Playfair Display';
}

.tagline{
    font-size:12px;
    letter-spacing:3px;
    margin-top:10px;
    color:#ccc;
}

section{
    padding:60px 20px;
}

.products{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:20px;
}

.product img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.product h3{font-size:14px;}
.product p{font-size:12px;color:#aaa;}

.admin{
    padding:20px;
    border-top:1px solid #333;
}

input,textarea{
    width:100%;
    margin:5px 0;
    padding:10px;
    background:#111;
    border:none;
    color:#fff;
}

button{
    padding:10px;
    width:100%;
    background:#fff;
    border:none;
    margin-top:10px;
}

@media(min-width:900px){
.products{grid-template-columns:repeat(4,1fr);}
.hero h2{font-size:70px;}
}
</style>
</head>

<body>

<nav>
<h1>ISHVI</h1>
</nav>

<div class="hero">
<h2>NEW COLLECTION</h2>
<div class="tagline">THE PERFECT YOU</div>
</div>

<section>
<h3>PRODUCTS</h3>
<div class="products" id="products"></div>
</section>

<!-- ADMIN PANEL -->
<section class="admin">
<h3>ADMIN PANEL</h3>

<input type="text" id="name" placeholder="Product Name">
<input type="text" id="price" placeholder="Price">
<textarea id="desc" placeholder="Description"></textarea>
<input type="file" id="image">

<button onclick="addProduct()">Add Product</button>
</section>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"></script>

<script>
// 🔴 PASTE YOUR FIREBASE CONFIG HERE
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR",
  appId: "YOUR"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// LOAD PRODUCTS
const container = document.getElementById("products");

function loadProducts(){
container.innerHTML="";
db.collection("products").get().then(snapshot=>{
snapshot.forEach(doc=>{
let p = doc.data();

let div = document.createElement("div");
div.className="product";

div.innerHTML=`
<img src="${p.image}">
<h3>${p.name}</h3>
<p>${p.price}</p>
`;

container.appendChild(div);
});
});
}

loadProducts();

// ADD PRODUCT
function addProduct(){
let file = document.getElementById("image").files[0];
let name = document.getElementById("name").value;
let price = document.getElementById("price").value;
let desc = document.getElementById("desc").value;

let storageRef = storage.ref("products/"+file.name);

storageRef.put(file).then(()=>{
storageRef.getDownloadURL().then(url=>{

db.collection("products").add({
name:name,
price:price,
desc:desc,
image:url
}).then(()=>{
alert("Product added");
loadProducts();
});

});
});
}
</script>

</body>
</html>
