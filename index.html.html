<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISHVI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#fff;color:#111;cursor:none;}

nav{display:flex;justify-content:space-between;padding:25px 80px;position:fixed;width:100%;background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);z-index:1000;}
nav h1{font-family:'Playfair Display';letter-spacing:4px;}
nav ul{display:flex;gap:40px;list-style:none;font-size:13px;}
nav li{cursor:pointer;}

.hero{height:100vh;background:url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d') center/cover;display:flex;align-items:flex-end;padding:80px;}
.hero h2{font-family:'Playfair Display';font-size:70px;color:#fff;}

section{padding:120px 80px;}
.section-title{font-size:14px;letter-spacing:2px;margin-bottom:60px;}

.products{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;}

.product{cursor:pointer;opacity:0;transform:translateY(20px);transition:0.8s;}
.product.show{opacity:1;transform:translateY(0);}

.product-img{position:relative;height:420px;overflow:hidden;}
.product-img img{position:absolute;width:100%;height:100%;object-fit:cover;transition:0.6s;}
.product-img img.second{opacity:0;}
.product:hover img.first{opacity:0;}
.product:hover img.second{opacity:1;}

.product h3{margin-top:15px;font-size:14px;}
.product p{font-size:13px;color:#555;}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:none;z-index:2000;padding:80px;}
.modal-content{display:flex;gap:80px;}
.modal img{width:400px;height:500px;object-fit:cover;}
.close{position:absolute;top:20px;right:40px;cursor:pointer;font-size:20px;}

.cart{position:fixed;right:-400px;top:0;width:350px;height:100%;background:#fff;border-left:1px solid #eee;padding:30px;transition:0.4s;z-index:3000;}
.cart.open{right:0;}

button{padding:12px 20px;border:none;background:#111;color:#fff;cursor:pointer;}

.cursor{width:10px;height:10px;background:#000;position:fixed;border-radius:50%;pointer-events:none;z-index:9999;}

@media(max-width:1000px){
.products{grid-template-columns:repeat(2,1fr);}
section{padding:80px 30px;}
}
</style>
</head>

<body>

<div class="cursor"></div>

<nav>
<h1>ISHVI</h1>
<ul>
<li>SHOP</li>
<li>COLLECTION</li>
<li onclick="toggleCart()">CART</li>
</ul>
</nav>

<div class="hero">
<h2>SPRING / SUMMER</h2>
</div>

<section>
<div class="section-title">NEW ARRIVALS</div>

<div class="products">

<div class="product" onclick="openModal('Black Hoodie','₹2999','https://images.unsplash.com/photo-1520975922284-9e0c6a0d6b79')">
<div class="product-img">
<img class="first" loading="lazy" src="https://images.unsplash.com/photo-1520975922284-9e0c6a0d6b79">
<img class="second" loading="lazy" src="https://images.unsplash.com/photo-1556821840-3a63f95609a7">
</div>
<h3>Black Hoodie</h3>
<p>₹2,999</p>
</div>

<div class="product" onclick="openModal('White Tee','₹1499','https://images.unsplash.com/photo-1516826957135-700dedea698c')">
<div class="product-img">
<img class="first" loading="lazy" src="https://images.unsplash.com/photo-1516826957135-700dedea698c">
<img class="second" loading="lazy" src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">
</div>
<h3>White Tee</h3>
<p>₹1,499</p>
</div>

</div>
</section>

<div class="modal" id="modal">
<div class="close" onclick="closeModal()">X</div>
<div class="modal-content">
<img id="modal-img">
<div>
<h2 id="modal-title"></h2>
<p id="modal-price"></p>
<button onclick="addToCart()">Add to Cart</button>
</div>
</div>
</div>

<div class="cart" id="cart">
<h3>Cart</h3>
<div id="cart-items"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lenis@1.0.6/bundled/lenis.min.js"></script>

<script>
// smooth scroll
const lenis = new Lenis();
function raf(time){lenis.raf(time);requestAnimationFrame(raf);}
requestAnimationFrame(raf);

// modal
let currentProduct="";
function openModal(title,price,img){
document.getElementById('modal').style.display='block';
document.getElementById('modal-title').innerText=title;
document.getElementById('modal-price').innerText=price;
document.getElementById('modal-img').src=img;
currentProduct=title+" - "+price;
}
function closeModal(){document.getElementById('modal').style.display='none';}

// cart with storage
let cart=JSON.parse(localStorage.getItem("cart"))||[];
function addToCart(){
cart.push(currentProduct);
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
}
function renderCart(){
const container=document.getElementById("cart-items");
container.innerHTML="";
cart.forEach(item=>{
let div=document.createElement("div");
div.classList.add("cart-item");
div.innerText=item;
container.appendChild(div);
});
}
renderCart();

function toggleCart(){
document.getElementById('cart').classList.toggle('open');
}

// cursor
const cursor=document.querySelector('.cursor');
document.addEventListener('mousemove',e=>{
cursor.style.top=e.clientY+'px';
cursor.style.left=e.clientX+'px';
});

// fade in
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
});
document.querySelectorAll('.product').forEach(el=>observer.observe(el));
</script>

</body>
</html>
